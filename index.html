<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do you want to date me?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
    :root{
        --blush: #fff1f2;
        --rose: #ff5d8f;
        --rose-deep: #e2366d;
        --plum: #3d1f2b;
        --gold: #f6c453;
        --mint: #5fc9b8;
        --card: #fffaf9;
    }

    *{ box-sizing: border-box; }

    body{
        margin: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Quicksand', sans-serif;
        background: radial-gradient(circle at 20% 20%, #ffe3ea 0%, var(--blush) 45%, #ffe9d6 100%);
        position: relative;
    }

    /* ambient floating hearts */
    .heart{
        position: absolute;
        bottom: -10%;
        font-size: 22px;
        opacity: 0.35;
        color: var(--rose);
        animation: floatUp linear infinite;
        pointer-events: none;
        user-select: none;
    }
    @keyframes floatUp{
        0%{ transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
        10%{ opacity: 0.4; }
        90%{ opacity: 0.35; }
        100%{ transform: translateY(-110vh) translateX(var(--drift, 20px)) rotate(20deg); opacity: 0; }
    }

    .container{
        position: relative;
        z-index: 2;
        text-align: center;
        background: var(--card);
        padding: 56px 40px 48px;
        border-radius: 28px;
        box-shadow: 0 30px 60px -20px rgba(226, 54, 109, 0.35), 0 0 0 1px rgba(255,255,255,0.6) inset;
        width: 85%;
        max-width: 420px;
        animation: riseIn 0.7s cubic-bezier(.2,.8,.2,1);
    }
    @keyframes riseIn{
        from{ opacity: 0; transform: translateY(24px) scale(0.96); }
        to{ opacity: 1; transform: translateY(0) scale(1); }
    }

    .eyebrow{
        font-family: 'Quicksand', sans-serif;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        font-size: 0.7rem;
        color: var(--mint);
        margin-bottom: 14px;
    }

    h1{
        font-family: 'Playfair Display', serif;
        font-style: italic;
        color: var(--plum);
        font-size: 2rem;
        line-height: 1.35;
        margin: 0 0 34px;
        transition: all 0.4s ease;
    }

    .buttons{
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 18px;
        position: relative;
        min-height: 54px;
    }

    button{
        padding: 14px 30px;
        font-family: 'Quicksand', sans-serif;
        font-size: 1.05rem;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        font-weight: 700;
        touch-action: none;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    #yesBtn{
        background: linear-gradient(135deg, var(--rose), var(--rose-deep));
        color: white;
        box-shadow: 0 10px 20px -8px rgba(226, 54, 109, 0.6);
        animation: pulse 1.8s ease-in-out infinite;
    }
    #yesBtn:hover{
        transform: scale(1.08);
        box-shadow: 0 14px 24px -8px rgba(226, 54, 109, 0.7);
    }
    @keyframes pulse{
        0%, 100%{ box-shadow: 0 10px 20px -8px rgba(226, 54, 109, 0.6); }
        50%{ box-shadow: 0 10px 26px -6px rgba(226, 54, 109, 0.85); }
    }

    #noBtn{
        background: #ffffff;
        color: var(--plum);
        border: 2px solid #ffd7e0;
        position: relative;
        z-index: 10;
    }

    .hint{
        margin-top: 22px;
        font-size: 0.8rem;
        color: #b98a97;
        opacity: 0.8;
    }

    /* confetti hearts burst on yes */
    .burst-heart{
        position: fixed;
        top: 50%;
        left: 50%;
        font-size: 20px;
        pointer-events: none;
        animation: burst 1.1s ease-out forwards;
        z-index: 20;
    }
    @keyframes burst{
        to{
            transform: translate(var(--bx), var(--by)) scale(0.4) rotate(var(--br));
            opacity: 0;
        }
    }
</style>
</head>
<body>

<div class="container">
    <div class="eyebrow">Just one question</div>
    <h1 id="question">Do you want to date me?</h1>
    <div class="buttons">
        <button id="yesBtn" onclick="celebrate()">Yes! ❤️</button>
        <button id="noBtn" onmouseover="moveButton()" ontouchstart="moveButton(event)">No 💔</button>
    </div>
    <div class="hint" id="hint">Fair warning: only one of these buttons cooperates 😉</div>
</div>

<script>
    // ambient background hearts
    const heartSymbols = ['♥','❤','💗'];
    for(let i=0; i<14; i++){
        const h = document.createElement('div');
        h.className = 'heart';
        h.textContent = heartSymbols[Math.floor(Math.random()*heartSymbols.length)];
        h.style.left = Math.random()*100 + 'vw';
        h.style.setProperty('--drift', (Math.random()*80-40) + 'px');
        h.style.animationDuration = (8 + Math.random()*10) + 's';
        h.style.animationDelay = (Math.random()*10) + 's';
        h.style.fontSize = (14 + Math.random()*18) + 'px';
        document.body.appendChild(h);
    }

    function moveButton(event){
        if(event){ event.preventDefault(); }
        const noBtn = document.getElementById('noBtn');
        noBtn.style.position = 'fixed';

        const padding = 40;
        const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - padding);
        const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - padding);

        noBtn.style.left = Math.max(padding, x) + 'px';
        noBtn.style.top = Math.max(padding, y) + 'px';
    }

    // keyboard focus also makes it flee, for full "impossible" coverage
    document.getElementById('noBtn').addEventListener('focus', moveButton);

    function celebrate(){
        document.getElementById('question').innerHTML = "I knew you'd say yes! 😉❤️";
        document.getElementById('hint').style.display = 'none';
        document.querySelector('.eyebrow').style.display = 'none';
        document.querySelector('.buttons').style.display = 'none';
        document.body.style.background = 'radial-gradient(circle at 30% 20%, #ffd9e4 0%, #ffe9d6 60%, #fff1f2 100%)';

        const symbols = ['❤','💖','💗','💕','✨'];
        for(let i=0; i<28; i++){
            const el = document.createElement('div');
            el.className = 'burst-heart';
            el.textContent = symbols[Math.floor(Math.random()*symbols.length)];
            const angle = Math.random()*Math.PI*2;
            const dist = 120 + Math.random()*220;
            el.style.setProperty('--bx', Math.cos(angle)*dist + 'px');
            el.style.setProperty('--by', Math.sin(angle)*dist + 'px');
            el.style.setProperty('--br', (Math.random()*360) + 'deg');
            el.style.animationDelay = (Math.random()*0.15) + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1300);
        }
    }
</script>

</body>
</html>
